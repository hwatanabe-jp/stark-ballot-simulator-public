name: Setup Node and pnpm
description: Checkout-safe Node.js + pnpm setup with cache and optional install

inputs:
  node-version:
    description: Node.js version
    required: false
    default: '24'
  install:
    description: Whether to run pnpm install
    required: false
    default: 'true'
  lockfile:
    description: Lockfile path for cache key
    required: false
    default: 'pnpm-lock.yaml'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
        cache-dependency-path: ${{ inputs.lockfile }}

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Review dependency build scripts
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: pnpm ignored-builds
