[book]
title = "STARK Ballot Simulator Public Docs"
description = "Public-facing documentation for the STARK Ballot Simulator project"
authors = ["STARK Ballot Simulator Team"]
language = "ja"
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/hwatanabe-jp/stark-ballot-simulator-public"
git-repository-icon = "fab-github"
additional-js = ["fzf.umd.js", "elasticlunr-fzf.js", "mermaid.min.js", "mermaid-init.js"]

[preprocessor.mermaid]
command = "mdbook-mermaid"
